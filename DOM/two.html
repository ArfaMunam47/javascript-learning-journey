<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM | chai aur code</title>
</head>
<body>
    <div class="parent">
        <div class="day">Monday</div>
        <div class="day">Tuesday</div>
        <div class="day">Wednesday</div>
        <div class="day">Thursday</div>
        <div class="day">Friday</div>
        <div class="day">Saturday</div>
        <div class="day">Sunday</div>
    </div>
    <!-- IMPORTANT THINGS TO NOTE
      WINDOW + LEFT ARROW // TO OPEN TAB IN ONE SIDE OF LAPTOP
      WINDOW + RIGHT ARROW // TO OPEN TAB IN OTHER SIDE OF LAPTOP
    -->
      <script>
       const parent= document.querySelector('.parent')
       console.log(parent);
       console.log(parent.children);
       console.log(parent.children[0]);
       console.log(parent.children[1].innerHTML);
      parent.children[0].style.backgroundColor='orange'
      parent.children[1].style.backgroundColor='red'
      parent.children[2].style.backgroundColor='green'
      parent.children[3].style.backgroundColor='pink'
      console.log(parent.firstElementChild)
      console.log(parent.lastElementChild)
       
      </script>
</body>
</html>
