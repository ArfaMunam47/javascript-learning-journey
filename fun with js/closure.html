  <script>
    // function check(){

    // // we can't access variables outside a function because of scope problem
    // ______________________ LEXICAL SCOPING CONCEPT
    function outer(){
        let name='Areej Fatima'
        function inner(){
            console.log(name)
        }
        inner()
    }
    outer()
    // INNER FUNCTION CAN ACCESS VARIABLES OF OUTER FUNCTION

     // ______________________ CLOSURE
     function closure(){
        let name='Closure Concept'
        function displayName(){
            console.log(name)
        }
        return displayName
     }
     let newFunc= closure()
newFunc()
//  IN CLOSURE -------- WE RETURN FUNCTION AND THEN USE THAT FUNCTION OUTSIDE THAT FUNCTION SCOPE


  </script>
