 <script>
    // HOW TO CREATE NEW ELEMENT IN DOM
   const div=  document.createElement('div')
   console.log(div);
   div.className='main'
   div.id=Math.round(Math.random() * 10 + 1)
   div.style.backgroundColor='pink'
   div.style.color='green'
   div.style.padding='20px'
   div.style.margin='30px'
   div.style.fontSize='25px'
   div.setAttribute("title","title generated")
//    there are two ways to add text 
// div.innerText="Hello World! This is Arfa Munam"
const text=document.createTextNode("Hey there, Just practicing and learning DOM concepts")
div.append(text)
document.body.appendChild(div)
// This is 2nd phase Testing and creating new element in DOM
const segment=document.createElement('segment')
console.log(segment);
segment.id='one'
segment.className='new'
// we have to write className here not just class
segment.setAttribute("title","Chai aur Code")
segment.innerText="Regret lasts longer than rejection and taking small steps can lead to success"
segment.style.backgroundColor='red'
segment.style.color='white'
segment.style.padding='20px'
segment.style.margin='30px'
segment.style.fontSize='20px'
document.body.append(segment)

   </script>
