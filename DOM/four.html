 <!-- EDIT AND REMOVE ELEMENTS IN DOM -->
  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chai AUR Code | DOM</title>
  </head>
  <body style="background-color: #574d4d;color:blanchedalmond;font-size: 30px;">
    <ul class="language">
        <li>Javascript</li>
    </ul>
  </body>
  <script>
    function addLang(langName){
        const li= document.createElement('li')
        li.innerHTML=`${langName}`
        document.querySelector('.language').appendChild(li)
    }
    addLang("Swift")
    addLang("Ruby")
    // this method traverse the items and for that reason we don't much use it for large projects
    // WE'LL USE OPTIMIZED METHOD
    function addOptiLang(langName){
        const li= document.createElement('li')
        li.appendChild(document.createTextNode(langName))
        document.querySelector('.language').appendChild(li)
    }
    addOptiLang("Html")
    addOptiLang("Java")
    addOptiLang("Python")
    // EDITITNG ELEMENTS IN DOM
   const sec=  document.querySelector("li:nth-child(2)")
//    sec.innerHTML="Mongo" //--------- 1st method
//    sec.outerHTML="<li>SQL</li>" //----------- 2nd method
const newLi=document.createElement('li')
newLi.textContent= "Oracle"
sec.replaceWith(newLi) //3rd method and optimized METHOD

// 2nd EXAMPLE OF EDITING ELEMENTS BY 3 APPROCH
// const first= document.querySelector("li:first-child")
const last= document.querySelector("li:last-child")
// last.innerHTML="Json"
// last.outerHTML="<li> Github </li>"
const anotherLi= document.createElement('li')
anotherLi.textContent="DB"
last.replaceWith(anotherLi)
// REMOVING ELEMENTS IN DOM
const first=document.querySelector("li:first-child")
first.remove()
const fourth=document.querySelector("li:nth-child(4)")
fourth.remove()
// DOM FINISHED
  </script>
  </html>
