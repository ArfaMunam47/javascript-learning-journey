 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html Events</title>
 </head>
 <body style="background-color: #414141;color:beige">
    <ul class="images">
        <li id="one"><img src="imgs/1.jpg" alt="one" width="250px" onclick="alert('I think its a girl image')"></li> <!-- not good approach-->
        <li id="two"><img src="imgs/2.jpg" alt="" width="250px"></li>
        <li id="three"><img src="imgs/3.jpg" alt="" width="250px"></li>
        <li id="four"><img src="imgs/4.jpg" alt="" width="250px"></li>
        <li id="five"><img src="imgs/5.jpg" alt="" width="250px"></li>
        <li id="six"><img src="imgs/6.jpg" alt="" width="250px"></li>
        <li id="seven"><a href="https://www.google.com/maps" style="color:beige;font-size: 30px;">Google</a></li>
    </ul>
    <div class="box1" style="color:beige;font-size: 30px;">BOX NO.1</div>
    <div class="box2" style="color:beige;font-size: 30px;">BOX NO.2</div>
    
 </body>
 <script>
    document.getElementById('two').onclick=function(){
        alert('Building Image') //not that good approach but still it works
    }
    // --type --timeStamp --preventDefault
    // --target(in which element event listener is happened) --currentTarget(parent div in which event listener is attached) srcElement(target) --toElement(mouseover/mouseout/click/dblclick)old method --relatedTarget(modern approach used for toElement)
    document.getElementById('seven').addEventListener('click',function(e){
        alert('Dont know exactly about the image') //modern and best approach
        e.preventDefault() //prevent default behaviour
        console.log(e)
        console.log(e.type) //which event listener is used
        console.log(e.timeStamp) //time in miliseconds
        console.log(e.target) //a
        console.log(e.srcElement) //a (old approach)
        console.log(e.currentTarget) //li
        
    })
    // --screenX --screenY --tiltX --tiltY 
    // --altkey --ctrlkey --shiftkey --keyCode(old) --key(modern)
   let box=  document.querySelector('.box1')
   box.addEventListener('mouseout',function(e){
    console.log(e.toElement) //old approach
    console.log(e.relatedTarget) //box2
    console.log(e.screenX) //x position on screen
    console.log(e.screenY) //y position on screen
    console.log(e.tiltY)
    console.log(e.tiltX)
    //tell us these keys are used or not and give us answer in boolean form
    console.log(e.altKey) //false
    console.log(e.ctrlKey) //false
    console.log(e.shiftKey) //false
   })
   document.addEventListener('keydown',function(e){
    console.log("Key: ",e.key)
    console.log("KeyCode: ",e.keyCode)
    console.log("Code: ",e.keyCode)
   })
//    learn about .. type ..timeStamp ..preventDefault .. target ..currentTarget ..srcElement .. toElement ..relatedTarget ..screenX .. screenY ..tiltX ..tiltY ..key ..keyCode ..altKey .. ctrlKey ..shiftKey 
// EVENT PROPAGATION
// 2 TYPES  --- bubbly event --- capturing event
document.querySelector('.images').addEventListener('click',function(e){
    console.log('Clicked inside the ul')
},false) //this is bubbly approach which goes from BOTTOM TO TOP or from child to parent
document.getElementById('six').addEventListener('click',function(e){
    e.stopPropagation()
    console.log('Boat Clicked')
},false)  //default behavious is also false but to mention it is important and seem professional

//CAPTURING APPROACH
document.querySelector('.images').addEventListener('click',function(e){
    console.log('Clicked inside the ul')
},true) //this is capturing approach which goes from TOP TO BOTTOM or from parent to child 
document.getElementById('five').addEventListener('click',function(e){
    console.log('Girly with book Clicked')
},true)  // it will goes from parent to child 
//Example of removing child when click one by one
document.querySelector('.images').addEventListener('click',function(e){
console.log(e.target.parentNode)
console.log(e.target.tagName)
if(e.target.tagName === 'IMG'){
    console.log(e.target.parentNode.id)
    let remove=e.target.parentNode
    remove.remove() //easy
    // remove.parentNode.removeChild(remove) //little tricky
}
})

 </script>

 </html>
