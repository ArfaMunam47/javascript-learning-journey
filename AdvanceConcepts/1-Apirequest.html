    5 states -------------- old api request
    0 --- client call ...no request send
    1 ---request send
    2 ---header and status available
    3 ---loading partial data
    4 ---operation completed
    To get our own API OF GITHUB PROFILE
    api.github.com/users/arfamunam47
    READY-STATE --- to see the current state
    API -- talking way between two systems / language/ frondend and backend -->
