  <!-- old API ACCESS METHOD -->
   <!-- API--- talking way between fontend or backend or between different system or languages
   API------- old method ----- xmlhttprequest
   5 STATES
   0 -- Client called
   1 -- Request sent
   2 -- Headers and status get available
   3 -- partial data loading
   4 -- operation complete -->
   <!-- api.github.com/users/arfamunam47          ______ TO ACCESS OUR OWN API  -->
    <!-- READYSTATE (current state) -->
    <!-- onreadystatechange (to see all states) -->
 </body>
 <script>
 const getData= function(){
   const xml= new XMLHttpRequest()
  const url= 'https://api.github.com/users/arfamunam47'
  xml.open('GET', url)
  // console.log('HERE')
  xml.onreadystatechange=function(){
console.log(xml.readyState)
if(xml.readyState === 4 && xml.status === 200){
  const data=JSON.parse(xml.responseText) //convert string to object
  console.log(data)
  const img= document.querySelector('img')
  const click= document.querySelector('#click')
  const name= document.querySelector('h2')
  const followers= document.querySelector('h3')
  const card= document.querySelector('.card')
  const bio= document.querySelector('p')
//  img.src='https://avatars.githubusercontent.com/u/246957019?v=4'
 img.src = data.avatar_url;




name.innerHTML="Name : <br>"+(data.name || data.login)
followers.innerHTML="<i>Followers: </i>"+ (data.followers)
bio.innerHTML="<i>About: </i>"+ (data.bio)
card.style.visibility = "visible";
  // console.log(typeof data)//string
  // console.log(data.followers)
  // console.log(data.public_repos)
  // console.log(data.avatar_url)
}
  }

  xml.send()
 }
 click.addEventListener('click',getData)
 
 </script>
