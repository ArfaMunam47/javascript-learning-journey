  <body style="background-color: #414141;color:bisque;">
    <!-- API ------ talking way between systems like frontend and backend or b/w different languages -->
     <!-- OLD API METHOD ---- xmlhttprequest -->
      <!-- 
     there are 5 states in xmlhttprequest
     0 -- client called
     1 -- request send
     2 -- header and status available
     3 -- hold partial data (loading)
     4 -- operation completed
      -->
     <!-- LINK TO GET UR OWN API OF GITHUB ________________ api.github.com/users/arfamunam47 -->
      <!-- readystate --> <!----------- oncurrentchangeon ------------------->
       <button id="click">
        Click Here
       </button>
       <div class="card">
        <img src="" alt="">
        <h1></h1>
        <h4><i></i></h4>
        <img src="" alt="">
       </div>
  </body>
<script>
  const click = document.querySelector('#click');
const card = document.querySelector('.card');
const img = document.querySelectorAll('img')[0];
const name = document.querySelector('h1');
const followers = document.querySelector('h4');

const userData = function () {
  const xml = new XMLHttpRequest();
  const url = 'https://api.github.com/users/sushmita-rgb';

  xml.open('GET', url);

  xml.onreadystatechange = function () {
    console.log(xml.readyState);

    if (xml.readyState === 4 && xml.status === 200) {
      const data = JSON.parse(xml.responseText);

      img.src = data.avatar_url;
      name.innerHTML = 'Name: <br>' + (data.name || data.login);
      followers.innerHTML = 'Followers: ' + data.followers;

      card.style.visibility = 'visible';
    }
  };

  xml.send();
};

click.addEventListener('click', userData);
</script>
  
   </html>
