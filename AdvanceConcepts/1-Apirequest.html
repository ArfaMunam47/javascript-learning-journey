 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <style>
        h1{
            color:#6495ed;

             margin-left:80px;

        }
        #click{
             font-size: 30px;
            background-color: #6495ed;
            border:3px solid blanchedalmond;

        .card{
            width:500px;

            visibility:hidden;

        .card:hover{
            cursor:pointer;
              box-shadow:  2px 2px 3px rgb(127, 122, 111);
        }
        .card img{
width:50%;
object-fit:cover;
float:right;
height:280px;

        }
        .card h2{
color:black;
font-size:30px;
margin-top:4px;
        }
        .card h3{
color:black;

margin-top:-4px;
        }
        .card h4{
            font-size:20px;
            margin-top:-10px;
color:black;
        }
    </style>
 </head>
 <body style="background-color: #414141;color:beige">
    <!-- OLD API METHOD 
     5 STATES
     0 _____________ client called 
     1 _____________ request send
     2 _____________ status and headers become available
     3 _____________ loading of partial data
     4 _____________ operation complete
     xmlHTTPrequest() //old method
     api.github.com/users/arfamunam47     ____________ to access our own api of github account
    -->
    <!-- API-------------- Talking way between frontend and backend or b/w different languages or b/w different systems -->
<h1><b><i>A SMALL JS PROJECT</i></b></h1>
    <button id="click">Click Here</button>
    <div class="card">
        <img src="" alt="">
        <h2></h2>
        <h3></h3>
        <h4></h4>
    </div>
 </body>
 <script>
const getUserData= function(){
    const xml= new XMLHttpRequest()
const url='https://api.github.com/users/arfamunam47'
xml.open('GET', url)
// console.log('HERE')
xml.onreadystatechange=function(){
console.log(xml.readyState) //current state
if(xml.readyState=== 4 && xml.status=== 200){
    const data= JSON.parse(xml.responseText) //to convert string into object
   console.log(data)
   console.log(typeof data)
   console.log(data.followers)
   console.log(data.bio)
  const click=  document.querySelector('#click')
  const card=  document.querySelector('.card')
  const img=  document.querySelector('img')
  const name=  document.querySelector('h2')
  const followers=  document.querySelector('h3')
  const bio=  document.querySelector('h4')
 img.src= data.avatar_url

  name.innerHTML='Name : <br>'+ (data.name||data.login)
  followers.innerHTML='Followers : '+ (data.followers)
  bio.innerHTML='About : <br>'+ (data.bio)
  card.style.visibility='visible'
}
}

xml.send()
}
click.addEventListener('click',getUserData)
 </script>
 </html>
